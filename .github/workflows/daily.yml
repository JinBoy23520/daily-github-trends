name: Daily GitHub Trending

on:
  schedule:
    # 每天 00:00 UTC = 08:00 北京时间
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch trending data
        run: |
          python3 << 'EOF'
          import urllib.request, re, json, os
          from datetime import datetime

          def fetch_trending(since=''):
              url = 'https://github.com/trending' + ('?since=' + since if since else '')
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  html = r.read().decode('utf-8')
              articles = re.findall(r'<article[^>]*>([\s\S]*?)</article>', html)
              results = []
              for a in articles:
                  h2 = re.search(r'href="/([^"/]+/[^"?"]+)"', a)
                  desc_m = re.search(r'<p[^>]*color-fg-muted[^>]*>([\s\S]*?)</p>', a)
                  stars_m = re.search(r'(\d[\d,]*) star', a)
                  lang_m = re.search(r'programmingLanguage[^>]*>([^<]+)</span>', a)
                  if h2:
                      repo = h2.group(1)
                      desc = re.sub('<[^>]+>', '', desc_m.group(1) if desc_m else '').strip()[:80]
                      stars = stars_m.group(1) if stars_m else '?'
                      lang = lang_m.group(1) if lang_m else ''
                      results.append({'repo': repo, 'desc': desc, 'stars': stars, 'lang': lang, 'use': ''})
              return results

          today = datetime.now().strftime('%Y-%m-%d')
          data = {
              'date': today,
              'daily': fetch_trending('daily'),
              'weekly': fetch_trending('weekly'),
              'monthly': fetch_trending('monthly')
          }

          os.makedirs('data', exist_ok=True)
          with open(f'data/{today}.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print(f'Done: data/{today}.json')
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes, skip commit"
          else
            git commit -m "docs: $(date +%Y-%m-%d) daily GitHub trending data"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
